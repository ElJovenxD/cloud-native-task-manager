<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Task Manager MVP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        input { width: 70%; padding: 10px; border-radius: 4px; border: none; }
        button { padding: 10px; background: #646cff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <h1>Cloud-Native Task Manager</h1>
    <div class="card">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="taskInput" placeholder="Nueva tarea...">
            <button onclick="agregarTarea()">Añadir</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <script>
        const API_URL = 'https://cloud-native-task-manager-5a8q.onrender.com/api/tasks';

        async function cargarTareas() {
            const res = await fetch(API_URL);
            const tareas = await res.json();
            const lista = document.getElementById('taskList');
            lista.innerHTML = tareas.map(t => `
                <li>
                    <span>${t.titulo}</span>
                    <span>${t.completada ? '✅' : '⏳'}</span>
                </li>
            `).join('');
        }

        async function agregarTarea() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo: input.value })
            });
            input.value = '';
            cargarTareas();
        }

        cargarTareas();
    </script>
</body>
</html>
